<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Talking Character</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>AI Talking Character</h1>
        <div class="character-container">
            <img id="character" class="character" alt="Talking character">
            <div class="mouth-overlay" id="mouthOverlay"></div>
        </div>
        
        <div class="controls">
            <input type="file" id="uploadInput" accept="image/*" hidden>
            <label for="uploadInput" class="btn file-btn">Choose Image &amp; Generate</label>
            <!-- Upload input now auto-triggers generation on file selection -->

            <div class="inline-row">
                <input type="text" id="textInput" placeholder="Enter prompt to generate character..." maxlength="200">
                <button id="generateBtn" class="btn">Generate Character</button>
            </div>

            <!-- new: separate speak input for speech text -->
            <div class="inline-row" style="margin-top:6px;">
                <input type="text" id="speakInput" placeholder="Enter text to speak..." maxlength="300">
                <button id="speakBtn" class="btn">Speak</button>
            </div>
        </div>
        
        <div class="status" id="status">Click "Generate Character" to create your AI character!</div>
        <div id="loadingOverlay" class="loading-overlay" aria-hidden="true">
            <div class="loading-card">
                <div class="spinner large" role="status" aria-label="Loading"></div>
                <div id="loadingMessage" class="loading-message">Loading...</div>
            </div>
        </div>
        <!-- Gallery of spoken generations -->
        <div id="gallery" class="gallery" aria-live="polite"></div>
    </div>
    
    <script type="module" src="script.js"></script>

</body>
</html>
